version: '3.8'

services:
  windows:
    build:
      context: .
      dockerfile: Dockerfile
    image: dockur/windows:latest
    container_name: windows-roblox-studio
    
    # Resource allocation for 4-core machine
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Port forwarding
    ports:
      - "5900:5900"   # VNC
      - "6080:6080"   # noVNC Web Interface
      - "8006:8006"   # Additional service
    
    # Volume mounts for persistence
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - windows-data:/home/user
    
    # Environment variables
    environment:
      DISPLAY: ":1"
      RESOLUTION: "1920x1080"
      VRAM: "2048"
    
    # Privileged mode for better compatibility
    privileged: true
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Network settings
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN

volumes:
  windows-data:
    driver: local
